<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Root Cmd Demo</title>
  <style>
    body { font-family: sans-serif; margin: 16px; background: #f6f7fb; color: #222; }
    h2 { margin-top: 0; }
    .card { background: #fff; border-radius: 10px; padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .cmd-row { display: flex; gap: 10px; align-items: stretch; }
    .cmd-input {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      resize: vertical;
      border: 1px solid #d0d7e2;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      background: #fff;
      color: #222;
      box-sizing: border-box;
    }
    button {
      background: #1565c0;
      color: #fff;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      min-width: 90px;
      cursor: pointer;
      font-size: 14px;
    }
    pre {
      margin-top: 12px;
      background: #111;
      color: #14ff85;
      padding: 12px;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 110px;
    }
    .hint { color: #666; font-size: 13px; margin: 8px 0 10px; }
  </style>
</head>
<body>
  <h2>WebView ROOT 命令 Demo</h2>
  <div class="card">
    <div class="cmd-row">
      <textarea
        id="cmdInput"
        class="cmd-input"
        placeholder="输入命令，例如：whoami"
        spellcheck="false"
      >whoami</textarea>
      <button id="runBtn" type="button">执行</button>
    </div>
    <p class="hint">按 Enter 执行，Shift + Enter 换行。</p>
    <pre id="result">等待执行...</pre>
  </div>

  <script>
    function root_cmd(mycmd) {
      const raw = NativeBridge.root_cmd(mycmd);
      return JSON.parse(raw);
    }

    function runCommand() {
      const resultEl = document.getElementById('result');
      const inputEl = document.getElementById('cmdInput');
      const cmd = inputEl.value.trim();

      if (!cmd) {
        resultEl.textContent = '请输入命令后再执行。';
        return;
      }

      try {
        const [stdout, stderr, code] = root_cmd(cmd);
        resultEl.textContent =
          'command: ' + cmd + '\n' +
          'stdout: ' + stdout + '\n' +
          'stderr: ' + stderr + '\n' +
          'statusCode: ' + code;
      } catch (err) {
        resultEl.textContent = '调用失败: ' + err;
      }
    }

    window.addEventListener('load', function () {
      const inputEl = document.getElementById('cmdInput');
      const runBtn = document.getElementById('runBtn');

      runBtn.addEventListener('click', runCommand);
      inputEl.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          runCommand();
        }
      });
    });
  </script>
</body>
</html>
